<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Rey Augusto vs Los Maxis</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      font-family: 'Courier New', monospace;
      overflow: hidden;
    }
    canvas {
      border: 2px solid #ffd700;
      box-shadow: 0 0 30px #ffd70066;
      cursor: crosshair;
    }
    #ui {
      color: #ffd700;
      font-size: 13px;
      text-align: center;
      margin-top: 6px;
      letter-spacing: 1px;
    }
  </style>
</head>
<body>
<canvas id="gameCanvas" width="800" height="600"></canvas>
<div id="ui">WASD / Flechas = Mover &nbsp;|&nbsp; Las balas disparan solas &nbsp;|&nbsp; ¡Sobrevive!</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

// ─── ESTADOS ───────────────────────────────────────────────────────────────
const STATE = { MENU:0, PLAYING:1, UPGRADE:2, BOSS:3, GAMEOVER:4, VICTORY:5 };
let state = STATE.MENU;

// ─── CONSTANTES ────────────────────────────────────────────────────────────
const W = canvas.width, H = canvas.height;
const WAVE_ENEMY_BASE = 8;
const WAVES_BEFORE_BOSS = 5;
const COLORS = {
  bg:'#0d1117', grid:'#161b22', player:'#ffd700', crown:'#ff8c00',
  zombie:'#4a7c4e', maxi:'#8b2fc9', boss:'#ff2244',
  bullet:'#00ffff', xp:'#00ff88', hp:'#ff4444', ui:'#ffd700'
};

// ─── INPUT ──────────────────────────────────────────────────────────────────
const keys = {};
document.addEventListener('keydown', e => { keys[e.key] = true; handleMenuKey(e); });
document.addEventListener('keyup',   e => { keys[e.key] = false; });

// ─── UTILES ─────────────────────────────────────────────────────────────────
const rnd  = (a,b)  => Math.random()*(b-a)+a;
const rndI = (a,b)  => Math.floor(rnd(a,b));
const dist = (a,b)  => Math.hypot(a.x-b.x, a.y-b.y);
const norm = (vx,vy)=> { const m=Math.hypot(vx,vy)||1; return [vx/m,vy/m]; };
const lerp = (a,b,t)=> a+(b-a)*t;

function spawnPos() {
  const side = rndI(0,4);
  if(side===0) return {x:rnd(0,W),   y:-30};
  if(side===1) return {x:rnd(0,W),   y:H+30};
  if(side===2) return {x:-30,         y:rnd(0,H)};
               return {x:W+30,        y:rnd(0,H)};
}

// ─── PARTÍCULAS ─────────────────────────────────────────────────────────────
let particles = [];
function spawnParticles(x,y,color,n=8,speed=3) {
  for(let i=0;i<n;i++){
    const a = rnd(0,Math.PI*2);
    const s = rnd(1,speed);
    particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,
      life:1,decay:rnd(0.02,0.05),r:rnd(2,5),color});
  }
}

// ─── FLOATING TEXT ──────────────────────────────────────────────────────────
let floats = [];
function floatText(x,y,txt,color='#fff') {
  floats.push({x,y,txt,color,life:1,decay:0.02});
}

// ─── XP GEMS ────────────────────────────────────────────────────────────────
let gems = [];
function dropGem(x,y,val) {
  gems.push({x,y,val,r:6,pull:false});
}

// ─── BULLETS ────────────────────────────────────────────────────────────────
let bullets = [];
function fireBullet(x,y,tx,ty,dmg,speed=10,r=4,color=COLORS.bullet) {
  const [vx,vy] = norm(tx-x,ty-y);
  bullets.push({x,y,vx:vx*speed,vy:vy*speed,dmg,r,color,life:1});
}

// ─── PLAYER ─────────────────────────────────────────────────────────────────
let player;
function resetPlayer() {
  player = {
    x:W/2, y:H/2,
    r:18,
    hp:100, maxHp:100,
    speed:3.2,
    dmg:12,
    fireRate:45,  // frames entre disparos
    fireCd:0,
    multiShot:1,
    piercing:false,
    xp:0, xpNext:50,
    level:0,
    wave:0,
    score:0,
    invFrames:0,
    // animación
    bobT:0
  };
}

// ─── ENEMIES ────────────────────────────────────────────────────────────────
let enemies = [];

function spawnZombie() {
  const p = spawnPos();
  enemies.push({
    type:'zombie', x:p.x, y:p.y, r:14,
    hp:30+player.wave*8, maxHp:30+player.wave*8,
    speed:0.8+player.wave*0.08,
    dmg:8, xpVal:5, score:10,
    color:COLORS.zombie, t:0
  });
}

function spawnMaxi() {
  const p = spawnPos();
  enemies.push({
    type:'maxi', x:p.x, y:p.y, r:16,
    hp:60+player.wave*15, maxHp:60+player.wave*15,
    speed:1.4+player.wave*0.1,
    dmg:14, xpVal:12, score:25,
    color:COLORS.maxi, t:0,
    shootCd:rnd(60,120), projectile:true
  });
}

// ─── BOSS ────────────────────────────────────────────────────────────────────
let boss = null;
let bossPhase = 1;
let bossAttackCd = 0;

function spawnBoss() {
  boss = {
    x:W/2, y:80, r:50,
    hp:1500+player.wave*100, maxHp:1500+player.wave*100,
    speed:1.2,
    dmg:20, xpVal:200, score:1000,
    t:0, phase:1,
    rageCd:0, dashCd:300,
    angle:0
  };
}

// ─── ENEMY BULLETS ──────────────────────────────────────────────────────────
let eBullets = [];
function fireEBullet(x,y,tx,ty,dmg,speed=5,r=5,color='#ff6600') {
  const [vx,vy] = norm(tx-x,ty-y);
  eBullets.push({x,y,vx:vx*speed,vy:vy*speed,dmg,r,color,life:1});
}

// ─── UPGRADE CARDS ──────────────────────────────────────────────────────────
const UPGRADES = [
  { name:'Corona Reforzada', desc:'+30 Vida Máxima', icon:'👑',
    apply:()=>{ player.maxHp+=30; player.hp=Math.min(player.hp+30,player.maxHp); }},
  { name:'Sable Real',       desc:'+15 Daño',        icon:'⚔️',
    apply:()=>{ player.dmg+=15; }},
  { name:'Botas del Rey',    desc:'+0.7 Velocidad',  icon:'👟',
    apply:()=>{ player.speed+=0.7; }},
  { name:'Ametralladora',    desc:'-15 Tiempo entre disparos', icon:'🔫',
    apply:()=>{ player.fireRate=Math.max(8,player.fireRate-15); }},
  { name:'Doble Cañón',      desc:'+1 Bala por disparo', icon:'💥',
    apply:()=>{ player.multiShot+=1; }},
  { name:'Poción Real',      desc:'Restaura 50 HP', icon:'🧪',
    apply:()=>{ player.hp=Math.min(player.hp+50,player.maxHp); }},
  { name:'Corazón de Oro',   desc:'+20 HP Máx y cura 20', icon:'❤️',
    apply:()=>{ player.maxHp+=20; player.hp=Math.min(player.hp+20,player.maxHp); }},
  { name:'Velocidad Bala',   desc:'+20% alcance',   icon:'🌟',
    apply:()=>{ player.dmg+=8; player.fireRate=Math.max(8,player.fireRate-8); }},
];
let upgradeChoices = [];
let upgradeHover = -1;

function pickUpgrades() {
  const pool = [...UPGRADES];
  upgradeChoices = [];
  for(let i=0;i<3;i++){
    const idx = rndI(0,pool.length);
    upgradeChoices.push(pool.splice(idx,1)[0]);
  }
}

// ─── WAVES ──────────────────────────────────────────────────────────────────
let waveTimer = 0;
let waveEnemiesLeft = 0;
let waveSpawnCd = 0;
let waveSpawned = 0;
let waveTotal = 0;
let bossMode = false;

function startWave() {
  player.wave++;
  bossMode = player.wave % (WAVES_BEFORE_BOSS+1) === 0;
  enemies = [];
  bullets = [];
  eBullets = [];
  gems = [];
  particles = [];
  floats = [];

  if(bossMode) {
    state = STATE.BOSS;
    spawnBoss();
    waveEnemiesLeft = 0;
    waveSpawned = waveTotal = 0;
  } else {
    state = STATE.PLAYING;
    boss = null;
    waveTotal = WAVE_ENEMY_BASE + (player.wave-1)*3;
    waveEnemiesLeft = waveTotal;
    waveSpawned = 0;
    waveSpawnCd = 0;
  }
  waveTimer = 0;
}

// ─── MOUSE ──────────────────────────────────────────────────────────────────
let mouseX = W/2, mouseY = H/2;
canvas.addEventListener('mousemove', e => {
  const r = canvas.getBoundingClientRect();
  mouseX = e.clientX - r.left;
  mouseY = e.clientY - r.top;
});
canvas.addEventListener('click', e => {
  if(state===STATE.UPGRADE) {
    const r = canvas.getBoundingClientRect();
    const mx = e.clientX-r.left, my = e.clientY-r.top;
    upgradeChoices.forEach((u,i)=>{
      const bx=W/2-280+i*200, by=H/2-120;
      if(mx>bx&&mx<bx+160&&my>by&&my<by+220) {
        u.apply();
        startWave();
      }
    });
  }
  if(state===STATE.MENU) { resetPlayer(); startWave(); }
  if(state===STATE.GAMEOVER||state===STATE.VICTORY) { init(); }
});
canvas.addEventListener('mousemove', e => {
  if(state===STATE.UPGRADE) {
    const r = canvas.getBoundingClientRect();
    const mx = e.clientX-r.left, my = e.clientY-r.top;
    upgradeHover=-1;
    upgradeChoices.forEach((u,i)=>{
      const bx=W/2-280+i*200, by=H/2-120;
      if(mx>bx&&mx<bx+160&&my>by&&my<by+220) upgradeHover=i;
    });
  }
});

function handleMenuKey(e) {
  if(e.key===' '||e.key==='Enter') {
    if(state===STATE.MENU) { resetPlayer(); startWave(); }
    if(state===STATE.GAMEOVER||state===STATE.VICTORY) init();
  }
}

// ─── INIT ────────────────────────────────────────────────────────────────────
function init() {
  particles=[]; floats=[]; gems=[]; bullets=[]; eBullets=[]; enemies=[]; boss=null;
  state=STATE.MENU;
}

// ─── UPDATE ──────────────────────────────────────────────────────────────────
function update() {
  if(state===STATE.PLAYING) updatePlaying();
  if(state===STATE.BOSS)    updateBoss();
  updateParticles();
  updateFloats();
}

function updatePlaying() {
  movePlayer();
  autoShoot();
  spawnWaveEnemies();
  updateEnemies();
  updateBullets();
  updateEBullets();
  updateGems();
  checkWaveComplete();
}

function updateBoss() {
  movePlayer();
  autoShoot();
  updateBossAI();
  updateBullets();
  updateEBullets();
  updateParticles();
  updateGems();
  if(!boss) {
    // Boss derrotado
    if(player.wave >= WAVES_BEFORE_BOSS*2) {
      state = STATE.VICTORY;
    } else {
      state = STATE.UPGRADE;
      pickUpgrades();
    }
  }
}

function movePlayer() {
  let vx=0, vy=0;
  if(keys['ArrowLeft']||keys['a']||keys['A']) vx=-1;
  if(keys['ArrowRight']||keys['d']||keys['D']) vx=1;
  if(keys['ArrowUp']||keys['w']||keys['W']) vy=-1;
  if(keys['ArrowDown']||keys['s']||keys['S']) vy=1;
  const [nx,ny] = norm(vx,vy);
  player.x = Math.max(player.r, Math.min(W-player.r, player.x+nx*player.speed));
  player.y = Math.max(player.r, Math.min(H-player.r, player.y+ny*player.speed));
  player.bobT += 0.1;
  if(player.fireCd>0) player.fireCd--;
  if(player.invFrames>0) player.invFrames--;
}

function autoShoot() {
  if(player.fireCd>0) return;
  // Apunta al enemigo más cercano
  let target=null, minD=Infinity;
  const allTargets = [...enemies, ...(boss?[boss]:[])];
  allTargets.forEach(e=>{
    const d=dist(player,e);
    if(d<minD){minD=d;target=e;}
  });
  if(!target) return;
  player.fireCd = player.fireRate;

  for(let i=0;i<player.multiShot;i++){
    const spread = (i-(player.multiShot-1)/2)*0.18;
    const [bx,by] = norm(target.x-player.x+Math.sin(spread)*100,
                         target.y-player.y+Math.cos(spread)*100-100*Math.tan(spread));
    bullets.push({
      x:player.x, y:player.y,
      vx:bx*11, vy:by*11,
      dmg:player.dmg, r:5,
      color:COLORS.bullet, life:1,
      piercing:player.piercing
    });
  }
  spawnParticles(player.x,player.y,COLORS.bullet,2,2);
}

function spawnWaveEnemies() {
  if(waveSpawned>=waveTotal) return;
  waveSpawnCd--;
  if(waveSpawnCd>0) return;
  waveSpawnCd = Math.max(20, 60 - player.wave*2);
  const ratio = player.wave/WAVES_BEFORE_BOSS;
  if(Math.random()<0.4+ratio*0.3) spawnMaxi();
  else spawnZombie();
  waveSpawned++;
}

function updateEnemies() {
  enemies.forEach(e=>{
    e.t++;
    // Movimiento hacia el jugador
    const [vx,vy] = norm(player.x-e.x, player.y-e.y);
    e.x+=vx*e.speed;
    e.y+=vy*e.speed;

    // Disparo de Maxis
    if(e.type==='maxi'&&e.projectile) {
      e.shootCd--;
      if(e.shootCd<=0) {
        e.shootCd=rnd(80,150);
        fireEBullet(e.x,e.y,player.x,player.y,e.dmg*0.6,6,5,'#cc44ff');
      }
    }

    // Colisión con jugador
    if(dist(e,player)<e.r+player.r && player.invFrames<=0) {
      player.hp -= e.dmg;
      player.invFrames = 45;
      spawnParticles(player.x,player.y,'#ff4444',6,4);
      floatText(player.x,player.y-20,`-${e.dmg}`,'#ff4444');
      if(player.hp<=0) { state=STATE.GAMEOVER; }
    }
  });

  // Eliminar muertos (marcados con hp<=0)
  enemies = enemies.filter(e=>e.hp>0);
}

function updateBullets() {
  bullets.forEach(b=>{
    b.x+=b.vx; b.y+=b.vy;
    // Fuera de pantalla
    if(b.x<-20||b.x>W+20||b.y<-20||b.y>H+20) { b.life=0; return; }

    // Colisión con enemigos
    enemies.forEach(e=>{
      if(b.life<=0) return;
      if(dist(b,e)<b.r+e.r) {
        e.hp-=b.dmg;
        spawnParticles(b.x,b.y,e.color,5,3);
        floatText(e.x,e.y-15,`-${b.dmg}`,'#fff');
        if(!b.piercing) b.life=0;
        if(e.hp<=0) {
          dropGem(e.x,e.y,e.xpVal);
          spawnParticles(e.x,e.y,e.color,12,4);
          player.score+=e.score;
          waveEnemiesLeft--;
        }
      }
    });

    // Colisión con boss
    if(boss&&b.life>0&&dist(b,boss)<b.r+boss.r) {
      boss.hp-=b.dmg;
      spawnParticles(b.x,b.y,COLORS.boss,4,3);
      floatText(boss.x+rnd(-30,30),boss.y+rnd(-20,0),`-${b.dmg}`,'#ff8888');
      if(!b.piercing) b.life=0;
      if(boss.hp<=0) {
        spawnParticles(boss.x,boss.y,'#ffd700',40,8);
        spawnParticles(boss.x,boss.y,'#ff2244',30,6);
        dropGem(boss.x,boss.y,boss.xpVal);
        player.score+=boss.score;
        boss=null;
      }
    }
  });
  bullets = bullets.filter(b=>b.life>0);
}

function updateEBullets() {
  eBullets.forEach(b=>{
    b.x+=b.vx; b.y+=b.vy;
    if(b.x<-20||b.x>W+20||b.y<-20||b.y>H+20) { b.life=0; return; }
    if(dist(b,player)<b.r+player.r && player.invFrames<=0) {
      player.hp-=b.dmg;
      player.invFrames=20;
      b.life=0;
      spawnParticles(player.x,player.y,'#ff8800',5,3);
      floatText(player.x,player.y-20,`-${Math.round(b.dmg)}`,'#ff8800');
      if(player.hp<=0) state=STATE.GAMEOVER;
    }
  });
  eBullets = eBullets.filter(b=>b.life>0);
}

function updateBossAI() {
  if(!boss) return;
  boss.t++;
  boss.angle+=0.02;

  // Fase 2 al 50% HP
  if(boss.hp<boss.maxHp*0.5 && boss.phase===1) {
    boss.phase=2;
    boss.speed=2.0;
    floatText(boss.x,boss.y-60,'¡MAXIMILIANO ENCOLERIZADO!','#ff2244');
  }

  // Movimiento
  const [vx,vy] = norm(player.x-boss.x, player.y-boss.y);
  boss.x+=vx*boss.speed;
  boss.y+=vy*boss.speed;
  boss.x=Math.max(boss.r,Math.min(W-boss.r,boss.x));
  boss.y=Math.max(boss.r,Math.min(H-boss.r,boss.y));

  // Ataques periódicos
  bossAttackCd--;
  if(bossAttackCd<=0) {
    bossAttackCd = boss.phase===1?90:60;
    const shots = boss.phase===1?6:10;
    for(let i=0;i<shots;i++){
      const a = (Math.PI*2/shots)*i + boss.angle;
      eBullets.push({
        x:boss.x,y:boss.y,
        vx:Math.cos(a)*5,vy:Math.sin(a)*5,
        dmg:boss.dmg,r:8,color:'#ff2244',life:1
      });
    }
  }

  // Dash
  boss.dashCd--;
  if(boss.dashCd<=0) {
    boss.dashCd=180;
    floatText(boss.x,boss.y-70,'¡DASH!','#ff8800');
    const [dx,dy]=norm(player.x-boss.x,player.y-boss.y);
    boss.x+=dx*200; boss.y+=dy*200;
    boss.x=Math.max(boss.r,Math.min(W-boss.r,boss.x));
    boss.y=Math.max(boss.r,Math.min(H-boss.r,boss.y));
  }

  // Colisión cuerpo
  if(dist(boss,player)<boss.r+player.r && player.invFrames<=0) {
    player.hp-=boss.dmg;
    player.invFrames=30;
    spawnParticles(player.x,player.y,'#ff2244',8,5);
    floatText(player.x,player.y-20,`-${boss.dmg}`,'#ff2244');
    if(player.hp<=0) state=STATE.GAMEOVER;
  }

  // Spawn enemigos adicionales en fase 2
  if(boss.phase===2 && boss.t%150===0 && enemies.length<8) {
    for(let i=0;i<2;i++) spawnZombie();
  }
  updateEnemies();
}

function updateGems() {
  gems.forEach(g=>{
    const d = dist(g,player);
    if(d<120) {
      const [vx,vy]=norm(player.x-g.x,player.y-g.y);
      g.x+=vx*5; g.y+=vy*5;
    }
    if(d<player.r+g.r) {
      g.collected=true;
      player.xp+=g.val;
      floatText(g.x,g.y-10,`+${g.val}XP`,COLORS.xp);
      if(player.xp>=player.xpNext) {
        player.xp-=player.xpNext;
        player.xpNext=Math.round(player.xpNext*1.4);
        player.level++;
        floatText(player.x,player.y-40,'¡NIVEL UP!','#ffd700');
        spawnParticles(player.x,player.y,'#ffd700',15,5);
      }
    }
  });
  gems=gems.filter(g=>!g.collected);
}

function checkWaveComplete() {
  if(waveSpawned>=waveTotal && enemies.length===0) {
    state = STATE.UPGRADE;
    pickUpgrades();
  }
}

function updateParticles() {
  particles.forEach(p=>{
    p.x+=p.vx; p.y+=p.vy;
    p.vx*=0.92; p.vy*=0.92;
    p.life-=p.decay;
  });
  particles=particles.filter(p=>p.life>0);
}

function updateFloats() {
  floats.forEach(f=>{ f.y-=0.8; f.life-=f.decay; });
  floats=floats.filter(f=>f.life>0);
}

// ─── DRAW ────────────────────────────────────────────────────────────────────
function draw() {
  ctx.fillStyle=COLORS.bg;
  ctx.fillRect(0,0,W,H);
  drawGrid();

  if(state===STATE.MENU)      drawMenu();
  else if(state===STATE.GAMEOVER) drawGameOver();
  else if(state===STATE.VICTORY)  drawVictory();
  else if(state===STATE.UPGRADE)  drawUpgrade();
  else {
    drawGems();
    drawEBullets();
    drawBullets();
    drawEnemies();
    if(boss) drawBoss();
    drawPlayer();
    drawParticles();
    drawFloats();
    drawHUD();
    if(state===STATE.BOSS) drawBossHUD();
  }
}

function drawGrid() {
  ctx.strokeStyle=COLORS.grid;
  ctx.lineWidth=0.5;
  for(let x=0;x<W;x+=40){ ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke(); }
  for(let y=0;y<H;y+=40){ ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke(); }
}

function drawPlayer() {
  const {x,y,r,invFrames,bobT} = player;
  const bob = Math.sin(bobT)*2;

  if(invFrames>0&&Math.floor(invFrames/4)%2===0) return;

  // Sombra
  ctx.save();
  ctx.globalAlpha=0.3;
  ctx.fillStyle='#000';
  ctx.beginPath();
  ctx.ellipse(x,y+r+2,r*0.8,r*0.3,0,0,Math.PI*2);
  ctx.fill();
  ctx.restore();

  // Cuerpo
  ctx.save();
  ctx.translate(x,y+bob);

  // Capa/manto
  ctx.fillStyle='#8B0000';
  ctx.beginPath();
  ctx.moveTo(-r*0.8,0);
  ctx.lineTo(-r*1.1,r*1.2);
  ctx.lineTo(r*1.1,r*1.2);
  ctx.lineTo(r*0.8,0);
  ctx.closePath();
  ctx.fill();

  // Cuerpo principal
  ctx.fillStyle=COLORS.player;
  ctx.beginPath();
  ctx.arc(0,0,r,0,Math.PI*2);
  ctx.fill();
  ctx.strokeStyle='#ff8c00';
  ctx.lineWidth=2;
  ctx.stroke();

  // Cara
  ctx.fillStyle='#000';
  ctx.beginPath(); ctx.arc(-6,-4,3,0,Math.PI*2); ctx.fill(); // ojo izq
  ctx.beginPath(); ctx.arc(6,-4,3,0,Math.PI*2);  ctx.fill(); // ojo der
  ctx.strokeStyle='#000';
  ctx.lineWidth=2;
  ctx.beginPath(); ctx.arc(0,4,6,0.1,Math.PI-0.1); ctx.stroke(); // sonrisa

  // Corona
  ctx.fillStyle='#ffd700';
  ctx.beginPath();
  ctx.moveTo(-10,-r+2);
  ctx.lineTo(-10,-r-12);
  ctx.lineTo(-5,-r-6);
  ctx.lineTo(0,-r-14);
  ctx.lineTo(5,-r-6);
  ctx.lineTo(10,-r-12);
  ctx.lineTo(10,-r+2);
  ctx.closePath();
  ctx.fill();
  ctx.strokeStyle='#ff8c00';
  ctx.lineWidth=1.5;
  ctx.stroke();

  // Joyas de la corona
  ['#ff0000','#00ff88','#0088ff'].forEach((c,i)=>{
    ctx.fillStyle=c;
    ctx.beginPath();
    ctx.arc(-6+(i*6),-r-4,2.5,0,Math.PI*2);
    ctx.fill();
  });

  // Espada
  ctx.strokeStyle='#aaddff';
  ctx.lineWidth=3;
  ctx.beginPath();
  ctx.moveTo(r-4,-r+4);
  ctx.lineTo(r+14,-r-14);
  ctx.stroke();
  ctx.strokeStyle='#8B6914';
  ctx.lineWidth=5;
  ctx.beginPath();
  ctx.moveTo(r-2,-r+8);
  ctx.lineTo(r+6,-r);
  ctx.stroke();

  ctx.restore();

  // Nombre
  ctx.fillStyle='#ffd700';
  ctx.font='bold 11px Courier New';
  ctx.textAlign='center';
  ctx.fillText('Rey Augusto',x,y-r-20+bob);
}

function drawEnemies() {
  enemies.forEach(e=>{
    const bob=Math.sin(e.t*0.08)*2;
    ctx.save();
    ctx.translate(e.x,e.y+bob);

    if(e.type==='zombie') drawZombieShape(e);
    else drawMaxiShape(e);

    // Barra de vida
    const bw=e.r*2.5, bh=5;
    ctx.fillStyle='#333';
    ctx.fillRect(-bw/2,e.r+4,bw,bh);
    ctx.fillStyle=e.hp/e.maxHp>0.5?'#4caf50':'#ff5722';
    ctx.fillRect(-bw/2,e.r+4,bw*(e.hp/e.maxHp),bh);

    ctx.restore();
  });
}

function drawZombieShape(e) {
  // Cuerpo zombie
  ctx.fillStyle='#2d4a2e';
  ctx.beginPath();
  ctx.arc(0,0,e.r,0,Math.PI*2);
  ctx.fill();
  ctx.fillStyle=COLORS.zombie;
  ctx.beginPath();
  ctx.arc(0,0,e.r-2,0,Math.PI*2);
  ctx.fill();
  ctx.strokeStyle='#1a3a1a';
  ctx.lineWidth=2;
  ctx.stroke();

  // Ojos zombie (X_X)
  ctx.strokeStyle='#ff0000';
  ctx.lineWidth=2;
  [[-5,-4],[5,-4]].forEach(([ox,oy])=>{
    ctx.beginPath(); ctx.moveTo(ox-3,oy-3); ctx.lineTo(ox+3,oy+3); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(ox+3,oy-3); ctx.lineTo(ox-3,oy+3); ctx.stroke();
  });
  // Boca
  ctx.strokeStyle='#880000';
  ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.moveTo(-5,5); ctx.lineTo(-2,4); ctx.lineTo(2,6); ctx.lineTo(5,4); ctx.stroke();

  // Letra Z
  ctx.fillStyle='#88ff88';
  ctx.font='bold 8px Courier New';
  ctx.textAlign='center';
  ctx.fillText('Z',0,-e.r-5);
}

function drawMaxiShape(e) {
  // Cuerpo Maxi (cultista alienígena)
  ctx.fillStyle='#5a1a8a';
  ctx.beginPath();
  ctx.arc(0,0,e.r,0,Math.PI*2);
  ctx.fill();
  ctx.fillStyle=COLORS.maxi;
  ctx.beginPath();
  ctx.arc(0,0,e.r-2,0,Math.PI*2);
  ctx.fill();
  ctx.strokeStyle='#cc66ff';
  ctx.lineWidth=2;
  ctx.stroke();

  // Ojos morados brillantes
  ctx.fillStyle='#ff88ff';
  ctx.beginPath(); ctx.arc(-5,-3,4,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(5,-3,4,0,Math.PI*2);  ctx.fill();
  ctx.fillStyle='#fff';
  ctx.beginPath(); ctx.arc(-4,-3,1.5,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(6,-3,1.5,0,Math.PI*2);  ctx.fill();

  // Boca amenazante
  ctx.strokeStyle='#ff44ff';
  ctx.lineWidth=2;
  ctx.beginPath(); ctx.arc(0,3,5,0,Math.PI); ctx.stroke();

  // M
  ctx.fillStyle='#ffaaff';
  ctx.font='bold 9px Courier New';
  ctx.textAlign='center';
  ctx.fillText('M',0,-e.r-5);
}

function drawBoss() {
  if(!boss) return;
  ctx.save();
  ctx.translate(boss.x,boss.y);

  const r=boss.r;
  const pulse = 1+Math.sin(boss.t*0.08)*0.05;
  ctx.scale(pulse,pulse);

  // Aura de fuego
  const grad=ctx.createRadialGradient(0,0,r,0,0,r+25);
  grad.addColorStop(0,'rgba(255,34,68,0.3)');
  grad.addColorStop(1,'rgba(255,34,68,0)');
  ctx.fillStyle=grad;
  ctx.beginPath(); ctx.arc(0,0,r+25,0,Math.PI*2); ctx.fill();

  // Picos del boss
  for(let i=0;i<8;i++){
    const a=boss.angle+(Math.PI*2/8)*i;
    ctx.save();
    ctx.rotate(a);
    ctx.fillStyle=boss.phase===2?'#ff8800':'#cc1133';
    ctx.beginPath();
    ctx.moveTo(0,-r+5);
    ctx.lineTo(-8,-r-20);
    ctx.lineTo(8,-r-20);
    ctx.closePath();
    ctx.fill();
    ctx.restore();
  }

  // Cuerpo
  ctx.fillStyle='#220011';
  ctx.beginPath(); ctx.arc(0,0,r,0,Math.PI*2); ctx.fill();
  ctx.fillStyle=boss.phase===2?'#cc2200':'#880022';
  ctx.beginPath(); ctx.arc(0,0,r-3,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle=boss.phase===2?'#ff8800':'#ff2244';
  ctx.lineWidth=3; ctx.stroke();

  // Cara del boss
  // Ojos
  ctx.fillStyle=boss.phase===2?'#ff8800':'#ff2244';
  ctx.beginPath(); ctx.arc(-14,-8,8,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(14,-8,8,0,Math.PI*2);  ctx.fill();
  ctx.fillStyle='#ffff00';
  ctx.beginPath(); ctx.arc(-13,-8,4,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(15,-8,4,0,Math.PI*2);  ctx.fill();
  ctx.fillStyle='#000';
  ctx.beginPath(); ctx.arc(-12,-8,2,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(16,-8,2,0,Math.PI*2);  ctx.fill();

  // Boca
  ctx.strokeStyle='#ff4400';
  ctx.lineWidth=3;
  ctx.beginPath(); ctx.arc(0,8,16,0,Math.PI); ctx.stroke();
  // Dientes
  ctx.fillStyle='#ffdddd';
  [-10,-3,4,11].forEach(tx=>{
    ctx.beginPath(); ctx.moveTo(tx,8); ctx.lineTo(tx+3,18); ctx.lineTo(tx+7,8); ctx.closePath(); ctx.fill();
  });

  // Nombre
  ctx.restore();
  ctx.fillStyle=boss.phase===2?'#ff8800':'#ff2244';
  ctx.font='bold 16px Courier New';
  ctx.textAlign='center';
  ctx.fillText('MAXIMILIANO',boss.x,boss.y-boss.r-35);
  if(boss.phase===2){
    ctx.fillStyle='#ff8800';
    ctx.font='bold 12px Courier New';
    ctx.fillText('⚡ MODO RABIA ⚡',boss.x,boss.y-boss.r-18);
  }
}

function drawBullets() {
  bullets.forEach(b=>{
    ctx.save();
    ctx.shadowColor=b.color;
    ctx.shadowBlur=10;
    ctx.fillStyle=b.color;
    ctx.beginPath(); ctx.arc(b.x,b.y,b.r,0,Math.PI*2); ctx.fill();
    ctx.restore();
  });
}

function drawEBullets() {
  eBullets.forEach(b=>{
    ctx.save();
    ctx.shadowColor=b.color;
    ctx.shadowBlur=12;
    ctx.fillStyle=b.color;
    ctx.beginPath(); ctx.arc(b.x,b.y,b.r,0,Math.PI*2); ctx.fill();
    ctx.restore();
  });
}

function drawGems() {
  gems.forEach(g=>{
    ctx.save();
    ctx.fillStyle=COLORS.xp;
    ctx.shadowColor=COLORS.xp;
    ctx.shadowBlur=8;
    ctx.beginPath();
    ctx.moveTo(g.x,g.y-g.r);
    ctx.lineTo(g.x+g.r,g.y);
    ctx.lineTo(g.x,g.y+g.r);
    ctx.lineTo(g.x-g.r,g.y);
    ctx.closePath();
    ctx.fill();
    ctx.restore();
  });
}

function drawParticles() {
  particles.forEach(p=>{
    ctx.save();
    ctx.globalAlpha=p.life;
    ctx.fillStyle=p.color;
    ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fill();
    ctx.restore();
  });
}

function drawFloats() {
  floats.forEach(f=>{
    ctx.save();
    ctx.globalAlpha=f.life;
    ctx.fillStyle=f.color;
    ctx.font='bold 14px Courier New';
    ctx.textAlign='center';

    ctx.restore();

}

  ctx.fillRect(hpX,hpY,hpW,hpH);

  const hpColor=hpRatio>0.6?'#44cc44':hpRatio>0.3?'#ffaa00':'#ff2244';
  ctx.fillStyle=hpColor;
  ctx.fillRect(hpX,hpY,hpW*Math.max(0,hpRatio),hpH);
  ctx.strokeStyle='#ffd700';
  ctx.lineWidth=1.5;
  ctx.strokeRect(hpX,hpY,hpW,hpH);
  ctx.fillStyle='#fff';

  const xpX=220, xpY=22;
  ctx.fillStyle='#001a00';
  ctx.fillRect(xpX,xpY,xpW,xpH);
  ctx.fillStyle=COLORS.xp;
  ctx.fillRect(xpX,xpY,xpW*(player.xp/player.xpNext),xpH);
  ctx.strokeStyle='#00ff88';
  ctx.lineWidth=1;
  ctx.strokeRect(xpX,xpY,xpW,xpH);
  ctx.fillStyle=COLORS.xp;
  ctx.font='10px Courier New';
  ctx.textAlign='center';
  ctx.fillText(`Nivel ${player.level} — XP ${player.xp}/${player.xpNext}`,xpX+xpW/2,xpY+10);

  // Info
  ctx.fillStyle=COLORS.ui;
  ctx.font='bold 13px Courier New';
  ctx.textAlign='left';
  ctx.fillText(`🏆 ${player.score}`,420,22);
  ctx.fillText(`🌊 Ola ${player.wave}`,520,22);

  // Stats mini
  ctx.fillStyle='#aaa';
  ctx.font='10px Courier New';
  ctx.fillText(`⚔️${player.dmg}  🔫${Math.round(player.multiShot)}x  ⚡${player.fireRate}f`,420,38);

  // Progreso ola (solo modo normal)
  if(state===STATE.PLAYING&&waveTotal>0){
    const prog = waveSpawned/waveTotal;
    const killed = waveTotal-waveEnemiesLeft-Math.max(0,waveTotal-waveSpawned);
    const actW=200, actH=6;
    ctx.fillStyle='#1a1a00';
    ctx.fillRect(W-actW-10,22,actW,actH);
    ctx.fillStyle='#ffdd00';
    ctx.fillRect(W-actW-10,22,actW*((waveTotal-waveEnemiesLeft)/waveTotal),actH);
    ctx.strokeStyle='#ffd700';
    ctx.lineWidth=1;
    ctx.strokeRect(W-actW-10,22,actW,actH);
    ctx.fillStyle=COLORS.ui;
    ctx.font='10px Courier New';
    ctx.textAlign='right';
    ctx.fillText(`Enemigos: ${waveEnemiesLeft} restantes`,W-10,18);
  }
}

function drawBossHUD() {
  if(!boss) return;
  const bw=400, bh=22;
  const bx=(W-bw)/2, by=H-45;

  // Background
  ctx.fillStyle='rgba(0,0,0,0.8)';
  ctx.fillRect(bx-10,by-20,bw+20,bh+30);
  ctx.strokeStyle='#ff2244';
  ctx.lineWidth=2;
  ctx.strokeRect(bx-10,by-20,bw+20,bh+30);

  // Label
  ctx.fillStyle=boss.phase===2?'#ff8800':'#ff2244';
  ctx.font='bold 13px Courier New';
  ctx.textAlign='center';
  ctx.fillText('👹 MAXIMILIANO ' + (boss.phase===2?'[MODO RABIA]':''),W/2,by-5);

  // Barra
  ctx.fillStyle='#300010';
  ctx.fillRect(bx,by,bw,bh);
  const ratio=boss.hp/boss.maxHp;
  const grad=ctx.createLinearGradient(bx,0,bx+bw,0);
  grad.addColorStop(0,'#ff2244');
  grad.addColorStop(0.5,boss.phase===2?'#ff8800':'#cc0033');
  grad.addColorStop(1,'#ff6600');
  ctx.fillStyle=grad;
  ctx.fillRect(bx,by,bw*ratio,bh);
  ctx.strokeStyle='#ff2244';
  ctx.lineWidth=2;
  ctx.strokeRect(bx,by,bw,bh);
  ctx.fillStyle='#fff';
  ctx.font='bold 12px Courier New';
  ctx.textAlign='center';
  ctx.fillText(`${Math.max(0,Math.floor(boss.hp))} / ${boss.maxHp}`,W/2,by+16);
}

// ─── HELPERS ────────────────────────────────────────────────────────────────
function roundRect(x,y,w,h,r) {
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.lineTo(x+w-r,y);
  ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);
  ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h);
  ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r);
  ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath();
}

function wrapText(ctx,text,cx,y,maxW,lineH) {
  const words=text.split(' ');
  let line='';
  words.forEach(w=>{
    const test=line+w+' ';
    if(ctx.measureText(test).width>maxW&&line!==''){
      ctx.fillText(line,cx,y); line=w+' '; y+=lineH;
    } else line=test;
  });
  ctx.fillText(line,cx,y);
}

// ─── GAME LOOP ───────────────────────────────────────────────────────────────
function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

init();
loop();
