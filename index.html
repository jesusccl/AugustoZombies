<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Rey Augusto vs Los Maxis</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      font-family: 'Courier New', monospace;
      overflow: hidden;
    }
    canvas {
      border: 2px solid #ffd700;
      box-shadow: 0 0 30px #ffd70066;
      cursor: crosshair;
    }
    #ui {
      color: #ffd700;
      font-size: 13px;
      text-align: center;
      margin-top: 6px;
      letter-spacing: 1px;
    }
  </style>
</head>
<body>
<canvas id="gameCanvas" width="800" height="600"></canvas>
<div id="ui">WASD / Flechas = Mover &nbsp;|&nbsp; Las balas disparan solas &nbsp;|&nbsp; ¡Sobrevive!</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

// ─── ESTADOS ───────────────────────────────────────────────────────────────
const STATE = { MENU:0, PLAYING:1, UPGRADE:2, BOSS:3, GAMEOVER:4, VICTORY:5 };
let state = STATE.MENU;

// ─── CONSTANTES ────────────────────────────────────────────────────────────
const W = canvas.width, H = canvas.height;
const WAVE_ENEMY_BASE = 8;
const WAVES_BEFORE_BOSS = 5;
const COLORS = {
  bg:'#0d1117', grid:'#161b22', player:'#ffd700', crown:'#ff8c00',
  zombie:'#4a7c4e', maxi:'#8b2fc9', boss:'#ff2244',
  bullet:'#00ffff', xp:'#00ff88', hp:'#ff4444', ui:'#ffd700'
};

// ─── INPUT ──────────────────────────────────────────────────────────────────
const keys = {};
document.addEventListener('keydown', e => { keys[e.key] = true; handleMenuKey(e); });
document.addEventListener('keyup',   e => { keys[e.key] = false; });

// ─── UTILES ─────────────────────────────────────────────────────────────────
const rnd  = (a,b)  => Math.random()*(b-a)+a;
const rndI = (a,b)  => Math.floor(rnd(a,b));
const dist = (a,b)  => Math.hypot(a.x-b.x, a.y-b.y);
const norm = (vx,vy)=> { const m=Math.hypot(vx,vy)||1; return [vx/m,vy/m]; };
const lerp = (a,b,t)=> a+(b-a)*t;

function spawnPos() {
  const side = rndI(0,4);
  if(side===0) return {x:rnd(0,W),   y:-30};
  if(side===1) return {x:rnd(0,W),   y:H+30};
  if(side===2) return {x:-30,         y:rnd(0,H)};
               return {x:W+30,        y:rnd(0,H)};
}

// ─── PARTÍCULAS ─────────────────────────────────────────────────────────────
let particles = [];
function spawnParticles(x,y,color,n=8,speed=3) {
  for(let i=0;i<n;i++){
    const a = rnd(0,Math.PI*2);
    const s = rnd(1,speed);
    particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,
      life:1,decay:rnd(0.02,0.05),r:rnd(2,5),color});
  }
}

// ─── FLOATING TEXT ──────────────────────────────────────────────────────────
let floats = [];
function floatText(x,y,txt,color='#fff') {
  floats.push({x,y,txt,color,life:1,decay:0.02});
}

// ─── XP GEMS ────────────────────────────────────────────────────────────────
let gems = [];
function dropGem(x,y,val) {
  gems.push({x,y,val,r:6,pull:false});
}

// ─── BULLETS ────────────────────────────────────────────────────────────────
let bullets = [];
function fireBullet(x,y,tx,ty,dmg,speed=10,r=4,color=COLORS.bullet) {
  const [vx,vy] = norm(tx-x,ty-y);
  bullets.push({x,y,vx:vx*speed,vy:vy*speed,dmg,r,color,life:1});
}

// ─── PLAYER ─────────────────────────────────────────────────────────────────
let player;
function resetPlayer() {
  player = {
    x:W/2, y:H/2,
    r:18,
    hp:100, maxHp:100,
    speed:3.2,
    dmg:12,
    fireRate:45,  // frames entre disparos
    fireCd:0,
    multiShot:1,
    piercing:false,
    xp:0, xpNext:50,
    level:0,
    wave:0,
    score:0,
    invFrames:0,
    // animación
    bobT:0
  };
}

// ─── ENEMIES ────────────────────────────────────────────────────────────────
let enemies = [];

function spawnZombie() {
  const p = spawnPos();
  enemies.push({
    type:'zombie', x:p.x, y:p.y, r:14,
    hp:30+player.wave*8, maxHp:30+player.wave*8,
    speed:0.8+player.wave*0.08,
    dmg:8, xpVal:5, score:10,
    color:COLORS.zombie, t:0
  });
}

function spawnMaxi() {
  const p = spawnPos();
  enemies.push({
    type:'maxi', x:p.x, y:p.y, r:16,
    hp:60+player.wave*15, maxHp:60+player.wave*15,
    speed:1.4+player.wave*0.1,
    dmg:14, xpVal:12, score:25,
    color:COLORS.maxi, t:0,
    shootCd:rnd(60,120), projectile:true
  });
}

// ─── BOSS ────────────────────────────────────────────────────────────────────
let boss = null;
let bossPhase = 1;
let bossAttackCd = 0;

function spawnBoss() {
  boss = {
    x:W/2, y:80, r:50,
    hp:1500+player.wave*100, maxHp:1500+player.wave*100,
    speed:1.2,
    dmg:20, xpVal:200, score:1000,
    t:0, phase:1,
    rageCd:0, dashCd:300,
    angle:0
  };
}

// ─── ENEMY BULLETS ──────────────────────────────────────────────────────────
let eBullets = [];
function fireEBullet(x,y,tx,ty,dmg,speed=5,r=5,color='#ff6600') {
  const [vx,vy] = norm(tx-x,ty-y);
  eBullets.push({x,y,vx:vx*speed,vy:vy*speed,dmg,r,color,life:1});
}

// ─── UPGRADE CARDS ──────────────────────────────────────────────────────────
const UPGRADES = [
  { name:'Corona Reforzada', desc:'+30 Vida Máxima', icon:'👑',
    apply:()=>{ player.maxHp+=30; player.hp=Math.min(player.hp+30,player.maxHp); }},
  { name:'Sable Real',       desc:'+15 Daño',        icon:'⚔️',
    apply:()=>{ player.dmg+=15; }},
  { name:'Botas del Rey',    desc:'+0.7 Velocidad',  icon:'👟',
    apply:()=>{ player.speed+=0.7; }},
  { name:'Ametralladora',    desc:'-15 Tiempo entre disparos', icon:'🔫',
    apply:()=>{ player.fireRate=Math.max(8,player.fireRate-15); }},
  { name:'Doble Cañón',      desc:'+1 Bala por disparo', icon:'💥',
    apply:()=>{ player.multiShot+=1; }},
  { name:'Poción Real',      desc:'Restaura 50 HP', icon:'🧪',
    apply:()=>{ player.hp=Math.min(player.hp+50,player.maxHp); }},
  { name:'Corazón de Oro',   desc:'+20 HP Máx y cura 20', icon:'❤️',
    apply:()=>{ player.maxHp+=20; player.hp=Math.min(player.hp+20,player.maxHp); }},
  { name:'Velocidad Bala',   desc:'+20% alcance',   icon:'🌟',
    apply:()=>{ player.dmg+=8; player.fireRate=Math.max(8,player.fireRate-8); }},
];
let upgradeChoices = [];
let upgradeHover = -1;

function pickUpgrades() {
  const pool = [...UPGRADES];
  upgradeChoices = [];
  for(let i=0;i<3;i++){
    const idx = rndI(0,pool.length);
    upgradeChoices.push(pool.splice(idx,1)[0]);
  }
}

// ─── WAVES ──────────────────────────────────────────────────────────────────
let waveTimer = 0;
let waveEnemiesLeft = 0;
let waveSpawnCd = 0;
let waveSpawned = 0;
let waveTotal = 0;
let bossMode = false;

function startWave() {
  player.wave++;
  bossMode = player.wave % (WAVES_BEFORE_BOSS+1) === 0;
  enemies = [];
  bullets = [];
  eBullets = [];
  gems = [];
  particles = [];
  floats = [];

  if(bossMode) {
    state = STATE.BOSS;
    spawnBoss();
    waveEnemiesLeft = 0;
    waveSpawned = waveTotal = 0;
  } else {
    state = STATE.PLAYING;
    boss = null;
    waveTotal = WAVE_ENEMY_BASE + (player.wave-1)*3;
    waveEnemiesLeft = waveTotal;
    waveSpawned = 0;
    waveSpawnCd = 0;
  }
  waveTimer = 0;
}

// ─── MOUSE ──────────────────────────────────────────────────────────────────
let mouseX = W/2, mouseY = H/2;
canvas.addEventListener('mousemove', e => {
  const r = canvas.getBoundingClientRect();
  mouseX = e.clientX - r.left;
  mouseY = e.clientY - r.top;
});
canvas.addEventListener('click', e => {
  if(state===STATE.UPGRADE) {
    const r = canvas.getBoundingClientRect();
    const mx = e.clientX-r.left, my = e.clientY-r.top;
    upgradeChoices.forEach((u,i)=>{
      const bx=W/2-280+i*200, by=H/2-120;
      if(mx>bx&&mx<bx+160&&my>by&&my<by+220) {
        u.apply();
        startWave();
      }
    });
  }
  if(state===STATE.MENU) { resetPlayer(); startWave(); }
  if(state===STATE.GAMEOVER||state===STATE.VICTORY) { init(); }
});
canvas.addEventListener('mousemove', e => {
  if(state===STATE.UPGRADE) {
    const r = canvas.getBoundingClientRect();
    const mx = e.clientX-r.left, my = e.clientY-r.top;
    upgradeHover=-1;
    upgradeChoices.forEach((u,i)=>{
      const bx=W/2-280+i*200, by=H/2-120;
      if(mx>bx&&mx<bx+160&&my>by&&my<by+220) upgradeHover=i;
    });
  }
});

function handleMenuKey(e) {
  if(e.key===' '||e.key==='Enter') {
    if(state===STATE.MENU) { resetPlayer(); startWave(); }
    if(state===STATE.GAMEOVER||state===STATE.VICTORY) init();
  }
}

// ─── INIT ────────────────────────────────────────────────────────────────────
function init() {
  particles=[]; floats=[]; gems=[]; bullets=[]; eBullets=[]; enemies=[]; boss=null;
  state=STATE.MENU;
}

// ─── UPDATE ──────────────────────────────────────────────────────────────────
function update() {
  if(state===STATE.PLAYING) updatePlaying();
  if(state===STATE.BOSS)    updateBoss();
  updateParticles();
  updateFloats();
}

function updatePlaying() {
  movePlayer();
  autoShoot();
  spawnWaveEnemies();
  updateEnemies();
  updateBullets();
  updateEBullets();
  updateGems();
  checkWaveComplete();
}

function updateBoss() {
  movePlayer();
  autoShoot();
  updateBossAI();
  updateBullets();
  updateEBullets();
  updateParticles();
  updateGems();
  if(!boss) {
    // Boss derrotado
    if(player.wave >= WAVES_BEFORE_BOSS*2) {
      state = STATE.VICTORY;
    } else {
      state = STATE.UPGRADE;
      pickUpgrades();
    }
  }
}

function movePlayer() {
  let vx=0, vy=0;
  if(keys['ArrowLeft']||keys['a']||keys['A']) vx=-1;
  if(keys['ArrowRight']||keys['d']||keys['D']) vx=1;
  if(keys['ArrowUp']||keys['w']||keys['W']) vy=-1;
  if(keys['ArrowDown']||keys['s']||keys['S']) vy=1;
  const [nx,ny] = norm(vx,vy);
  player.x = Math.max(player.r, Math.min(W-player.r, player.x+nx*player.speed));
  player.y = Math.max(player.r, Math.min(H-player.r, player.y+ny*player.speed));
  player.bobT += 0.1;
  if(player.fireCd>0) player.fireCd--;
  if(player.invFrames>0) player.invFrames--;
}

function autoShoot() {
  if(player.fireCd>0) return;
  // Apunta al enemigo más cercano
  let target=null, minD=Infinity;
  const allTargets = [...enemies, ...(boss?[boss]:[])];
  allTargets.forEach(e=>{
    const d=dist(player,e);
    if(d<minD){minD=d;target=e;}
  });
  if(!target) return;
  player.fireCd = player.fireRate;

  for(let i=0;i<player.multiShot;i++){
    const spread = (i-(player.multiShot-1)/2)*0.18;
    const [bx,by] = norm(target.x-player.x+Math.sin(spread)*100,
                         target.y-player.y+Math.cos(spread)*100-100*Math.tan(spread));
    bullets.push({
      x:player.x, y:player.y,
      vx:bx*11, vy:by*11,
      dmg:player.dmg, r:5,
      color:COLORS.bullet, life:1,
      piercing:player.piercing
    });
  }
  spawnParticles(player.x,player.y,COLORS.bullet,2,2);
}

function spawnWaveEnemies() {
  if(waveSpawned>=waveTotal) return;
  waveSpawnCd--;
  if(waveSpawnCd>0) return;
  waveSpawnCd = Math.max(20, 60 - player.wave*2);
  const ratio = player.wave/WAVES_BEFORE_BOSS;
  if(Math.random()<0.4+ratio*0.3) spawnMaxi();
  else spawnZombie();
  waveSpawned++;
}

function updateEnemies() {
  enemies.forEach(e=>{
    e.t++;
    // Movimiento hacia el jugador
    const [vx,vy] = norm(player.x-e.x, player.y-e.y);
    e.x+=vx*e.speed;
    e.y+=vy*e.speed;

    // Disparo de Maxis
    if(e.type==='maxi'&&e.projectile) {
      e.shootCd--;
      if(e.shootCd<=0) {
        e.shootCd=rnd(80,150);
        fireEBullet(e.x,e.y,player.x,player.y,e.dmg*0.6,6,5,'#cc44ff');
      }
    }

    // Colisión con jugador
    if(dist(e,player)<e.r+player.r && player.invFrames<=0) {
      player.hp -= e.dmg;
      player.invFrames = 45;
      spawnParticles(player.x,player.y,'#ff4444',6,4);
      floatText(player.x,player.y-20,`-${e.dmg}`,'#ff4444');
      if(player.hp<=0) { state=STATE.GAMEOVER; }
    }
  });

  // Eliminar muertos (marcados con hp<=0)
  enemies = enemies.filter(e=>e.hp>0);
}

function updateBullets() {
  bullets.forEach(b=>{
    b.x+=b.vx; b.y+=b.vy;
    // Fuera de pantalla
    if(b.x<-20||b.x>W+20||b.y<-20||b.y>H+20) { b.life=0; return; }

    // Colisión con enemigos
    enemies.forEach(e=>{
      if(b.life<=0) return;
      if(dist(b,e)<b.r+e.r) {
        e.hp-=b.dmg;
        spawnParticles(b.x,b.y,e.color,5,3);
        floatText(e.x,e.y-15,`-${b.dmg}`,'#fff');
        if(!b.piercing) b.life=0;
        if(e.hp<=0) {
          dropGem(e.x,e.y,e.xpVal);
          spawnParticles(e.x,e.y,e.color,12,4);
          player.score+=e.score;
          waveEnemiesLeft--;
        }
      }
    });

    // Colisión con boss
    if(boss&&b.life>0&&dist(b,boss)<b.r+boss.r) {
      boss.hp-=b.dmg;
      spawnParticles(b.x,b.y,COLORS.boss,4,3);
      floatText(boss.x+rnd(-30,30),boss.y+rnd(-20,0),`-${b.dmg}`,'#ff8888');
      if(!b.piercing) b.life=0;
      if(boss.hp<=0) {
        spawnParticles(boss.x,boss.y,'#ffd700',40,8);
        spawnParticles(boss.x,boss.y,'#ff2244',30,6);
        dropGem(boss.x,boss.y,boss.xpVal);
        player.score+=boss.score;
        boss=null;
      }
    }
  });
  bullets = bullets.filter(b=>b.life>0);
}

function updateEBullets() {
  eBullets.forEach(b=>{
    b.x+=b.vx; b.y+=b.vy;
    if(b.x<-20<span class="ml-2" /><span class="inline-block w-3 h-3 rounded-full bg-neutral-a12 align-middle mb-[0.1rem]" />
